id: page_feedback
title: 'Page Feedback'
description: ''
categories: {  }
elements: |-
  page_title:
    '#type': value
    '#title': 'Page title'
    '#value': '[current-page:title]'
  page_url:
    '#type': value
    '#title': 'Page URL'
    '#value': '[current-page:url]'
  search_query:
    '#type': value
    '#title': 'Search query'
    '#value': '[current-page:query:query]'
  was_this_page_helpful:
    '#type': radios
    '#title': 'Was this page helpful?'
    '#title_display': inline
    '#options':
      'yes': '<i class="fa-solid fa-thumbs-up fa-fw fs-4"></i><span class="visually-hidden">Yes</span>'
      'no': '<i class="fa-solid fa-thumbs-down fa-fw fs-4"></i><span class="visually-hidden">No</span>'
    '#options_display': two_columns
    '#wrapper_type': form_element
    '#wrapper_attributes':
      class:
        - yes-no-trigger-wrapper
        - d-flex
        - align-items-center
        - justify-content-end
    '#attributes':
      class:
        - yes-no-trigger
  how_can_we_improve_this_page:
    '#type': textarea
    '#title': 'How can we improve this page?'
    '#states':
      visible:
        ':input[name="was_this_page_helpful"]':
          value: 'no'
      required:
        ':input[name="was_this_page_helpful"]':
          value: 'no'
    '#label_attributes':
      class:
        - mb-3
  how_did_this_page_help_you:
    '#type': textarea
    '#title': 'How did this page help you?'
    '#states':
      visible:
        ':input[name="was_this_page_helpful"]':
          value: 'yes'
      required:
        ':input[name="was_this_page_helpful"]':
          value: 'yes'
    '#label_attributes':
      class:
        - mb-3
  department:
    '#type': value
    '#title': Department
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#states':
      visible:
        ':input[name="was_this_page_helpful"]':
          checked: true
    '#submit__label': 'Submit feedback'
